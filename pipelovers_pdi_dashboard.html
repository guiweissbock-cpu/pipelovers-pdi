<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PipeLovers — Dashboard PDI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #0f2952;
  --blue:      #1a4a8a;
  --blue-mid:  #2563b0;
  --sky:       #3b82f6;
  --sky-light: #eff6ff;
  --sky-pale:  #f8faff;
  --white:     #ffffff;
  --gray-50:   #f9fafb;
  --gray-100:  #f1f5f9;
  --gray-200:  #e2e8f0;
  --gray-400:  #94a3b8;
  --gray-600:  #475569;
  --gray-800:  #1e293b;
  --green:     #059669;
  --green-bg:  #ecfdf5;
  --green-bd:  #a7f3d0;
  --amber:     #d97706;
  --amber-bg:  #fffbeb;
  --amber-bd:  #fde68a;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --shadow-sm: 0 1px 3px rgba(15,41,82,.07), 0 1px 2px rgba(15,41,82,.05);
  --shadow:    0 4px 16px rgba(15,41,82,.09), 0 1px 4px rgba(15,41,82,.05);
  --radius:    12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; font-size: 14px; }

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 0 28px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 12px rgba(15,41,82,.18);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 32px; height: 32px; background: var(--sky);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: white; letter-spacing: -1px;
}
.brand-name { font-size: 17px; font-weight: 700; color: white; letter-spacing: -.3px; }
.brand-tag { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated-chip { font-size: 12px; color: rgba(255,255,255,.45); }
.btn-print {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.85); padding: 6px 14px; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all .2s; letter-spacing: .2px;
}
.btn-print:hover { background: rgba(255,255,255,.18); color: white; }

/* ── FILTER BAR ── */
.filter-bar {
  background: white; border-bottom: 1px solid var(--gray-200);
  padding: 12px 28px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
}
.fg { display: flex; flex-direction: column; gap: 3px; }
.fl { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .6px; }
select, input[type="text"] {
  background: var(--gray-50); border: 1.5px solid var(--gray-200);
  color: var(--gray-800); padding: 7px 11px; border-radius: 8px;
  font-size: 13px; font-family: inherit; outline: none; min-width: 155px;
  transition: border-color .15s;
}
select:focus, input:focus { border-color: var(--sky); background: white; }
.btn-reset {
  background: white; border: 1.5px solid var(--gray-200); color: var(--gray-600);
  padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.btn-reset:hover { border-color: var(--sky); color: var(--blue); }
.count-tag {
  font-size: 12px; font-weight: 600; color: var(--blue-mid);
  background: var(--sky-light); border: 1px solid #bfdbfe;
  padding: 5px 10px; border-radius: 20px; align-self: flex-end;
}

/* ── LAYOUT ── */
.main { display: flex; height: calc(100vh - 109px); }

/* ── LIST PANEL ── */
.list-panel {
  width: 300px; flex-shrink: 0;
  background: white; border-right: 1px solid var(--gray-200);
  overflow-y: auto; display: flex; flex-direction: column;
}
.list-section-title {
  padding: 12px 16px 8px; font-size: 10px; font-weight: 700;
  color: var(--gray-400); text-transform: uppercase; letter-spacing: .7px;
  border-bottom: 1px solid var(--gray-100); background: white;
  position: sticky; top: 0; z-index: 10;
}
.person-row {
  padding: 12px 16px; cursor: pointer;
  border-bottom: 1px solid var(--gray-100);
  transition: background .12s;
  border-left: 3px solid transparent;
}
.person-row:hover { background: var(--sky-pale); }
.person-row.active { background: var(--sky-light); border-left-color: var(--sky); }
.pr-name { font-size: 13px; font-weight: 600; color: var(--gray-800); margin-bottom: 3px; line-height: 1.3; }
.pr-meta { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.pr-company { font-size: 11px; color: var(--gray-400); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-pdi { display: flex; align-items: center; gap: 5px; }
.pr-bar { width: 44px; height: 4px; background: var(--gray-200); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.pr-fill { height: 100%; border-radius: 2px; }
.pr-pct { font-size: 11px; font-weight: 700; }
.no-results { padding: 40px 16px; text-align: center; color: var(--gray-400); font-size: 13px; }

/* ── DETAIL PANEL ── */
.detail-panel { flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--gray-50); }

/* ── EMPTY STATE ── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; }
.empty-icon { width: 64px; height: 64px; background: var(--sky-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.empty-text { font-size: 15px; font-weight: 600; color: var(--gray-600); }
.empty-sub { font-size: 13px; color: var(--gray-400); }

/* ── DETAIL HEADER ── */
.det-name { font-size: 24px; font-weight: 800; color: var(--navy); letter-spacing: -.4px; margin-bottom: 6px; }
.det-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-co { background: var(--sky-light); color: var(--blue-mid); border: 1px solid #bfdbfe; }
.badge-role { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }
.badge-cs { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }

/* ── KPI ROW ── */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi {
  background: white; border: 1.5px solid var(--gray-200);
  border-radius: var(--radius); padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}
.kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-400); margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 800; line-height: 1; letter-spacing: -.5px; }
.kv-blue  { color: var(--blue-mid); }
.kv-green { color: var(--green); }
.kv-amber { color: var(--amber); }
.kv-navy  { color: var(--navy); }

/* ── SECTION TITLE ── */
.sec-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: var(--gray-400); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.sec-title::after { content: ""; flex: 1; height: 1px; background: var(--gray-200); }

/* ── PROGRESS CARD ── */
.progress-card {
  background: white; border: 1.5px solid var(--gray-200); border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 24px;
  box-shadow: var(--shadow-sm);
}
.prog-pct { font-size: 52px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
.prog-label { font-size: 13px; color: var(--gray-400); margin-top: 4px; font-weight: 500; }
.prog-bar-wrap { flex: 1; }
.prog-bar-outer { background: var(--gray-100); border-radius: 8px; height: 12px; overflow: hidden; }
.prog-bar-inner { height: 100%; border-radius: 8px; transition: width .7s cubic-bezier(.4,0,.2,1); }

/* ── CHART ── */
.chart-card {
  background: white; border: 1.5px solid var(--gray-200); border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm);
}
.chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 100px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 0; }
.bar-body {
  width: 100%; min-height: 4px; border-radius: 5px 5px 0 0;
  background: var(--sky); position: relative; cursor: default;
  transition: background .15s;
}
.bar-body:hover { background: var(--blue-mid); }
.bar-tip {
  position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%);
  background: var(--navy); color: white; padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 20;
}
.bar-body:hover .bar-tip { opacity: 1; }
.bar-lbl { font-size: 9px; color: var(--gray-400); font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; max-width: 100%; }
.no-chart { text-align: center; padding: 28px; color: var(--gray-400); font-size: 13px; }

/* ── LESSONS ── */
.lessons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.lesson {
  background: white; border: 1.5px solid var(--gray-200); border-radius: 10px;
  padding: 13px 15px; display: flex; align-items: flex-start; gap: 10px;
  box-shadow: var(--shadow-sm); transition: box-shadow .15s;
}
.lesson:hover { box-shadow: var(--shadow); }
.lesson-done { border-color: var(--green-bd); background: var(--green-bg); }
.lesson-pend { opacity: .78; }
.l-icon {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 11px; margin-top: 1px;
}
.l-icon-done { background: #d1fae5; color: var(--green); }
.l-icon-pend { background: var(--gray-100); color: var(--gray-400); border: 1px solid var(--gray-200); }
.l-body { flex: 1; min-width: 0; }
.l-title { font-size: 12px; line-height: 1.45; font-weight: 500; color: var(--gray-800); }
.l-status { font-size: 10px; font-weight: 700; margin-top: 3px; }
.l-status-done { color: var(--green); }
.l-status-pend { color: var(--gray-400); }
.l-link { display: inline-block; margin-top: 5px; font-size: 11px; color: var(--sky); font-weight: 600; text-decoration: none; }
.l-link:hover { text-decoration: underline; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

@media print {
  .header, .filter-bar, .list-panel { display: none !important; }
  .detail-panel { padding: 16px; overflow: visible; }
  .main { height: auto; }
  body { background: white; }
}
</style>
</head>

  </div>
</div>

cos.forEach(function(c){ var o=document.createElement("option"); o.value=c; o.textContent=c; csel.appendChild(o); });

function filter() {
  var q  = document.getElementById("s-name").value.toLowerCase();
  var co = document.getElementById("s-company").value;
  var pr = document.getElementById("s-progress").value;
  fd = D.filter(function(d) {
    if (q  && d.name.toLowerCase().indexOf(q)<0) return false;
    if (co && d.company!==co) return false;
    if (pr==="ns"   && d.pdi_pct!==0) return false;
    if (pr==="ip"   && (d.pdi_pct===0||d.pdi_pct===100)) return false;
    if (pr==="done" && d.pdi_pct!==100) return false;
    return true;
  });
  document.getElementById("count-tag").textContent = fd.length + " pessoas";
  renderList();
}
function reset() {
  document.getElementById("s-name").value="";
  document.getElementById("s-company").value="";
  document.getElementById("s-progress").value="";
  filter();
}

function renderList() {
  var c = document.getElementById("person-list");
  c.innerHTML = "";
  if (!fd.length) { c.innerHTML='<div class="no-results">Nenhum resultado</div>'; return; }
  fd.forEach(function(p) {
    var div = document.createElement("div");
    div.className = "person-row" + (sel===p.name?" active":"");
    var col = pColor(p.pdi_pct);
    div.innerHTML =
      '<div class="pr-name">'+esc(p.name)+'</div>'+
      '<div class="pr-meta">'+
        '<span class="pr-company">'+esc(p.company||"—")+'</span>'+
        '<div class="pr-pdi">'+
          '<div class="pr-bar"><div class="pr-fill" style="width:'+p.pdi_pct+'%;background:'+col+'"></div></div>'+
          '<span class="pr-pct" style="color:'+col+'">'+p.pdi_pct+'%</span>'+
        '</div>'+
      '</div>';
    div.addEventListener("click", function(){ pick(p); });
    c.appendChild(div);
  });
}

function pick(p) { sel=p.name; renderList(); renderDetail(p); }

function renderDetail(p) {
  var panel = document.getElementById("detail-panel");
  var col = pColor(p.pdi_pct);

  // KPIs
  var kpi =
    '<div class="kpi-row">'+
      '<div class="kpi"><div class="kpi-label">Aulas assistidas</div><div class="kpi-value kv-blue">'+p.total_consumed+'</div></div>'+
      '<div class="kpi"><div class="kpi-label">PDI concluido</div><div class="kpi-value kv-green">'+p.pdi_done+' / '+p.pdi_total+'</div></div>'+
      '<div class="kpi"><div class="kpi-label">Evolucao</div><div class="kpi-value" style="color:'+col+'">'+p.pdi_pct+'%</div></div>'+
      '<div class="kpi"><div class="kpi-label">Pendentes</div><div class="kpi-value kv-amber">'+(p.pdi_total-p.pdi_done)+'</div></div>'+
    '</div>';

  // Progress bar
  var prog =
    '<div class="sec-title">Evolucao do PDI</div>'+
    '<div class="progress-card">'+
      '<div>'+
        '<div class="prog-pct" style="color:'+col+'">'+p.pdi_pct+'%</div>'+
        '<div class="prog-label">'+p.pdi_done+' de '+p.pdi_total+' aulas concluidas</div>'+
      '</div>'+
      '<div class="prog-bar-wrap">'+
        '<div class="prog-bar-outer">'+
          '<div class="prog-bar-inner" style="width:'+p.pdi_pct+'%;background:'+col+'"></div>'+
        '</div>'+
      '</div>'+
    '</div>';

  // Chart
  var months = Object.keys(p.consumed_by_month||{});
  var chart = '<div class="sec-title">Consumo mensal de aulas</div><div class="chart-card">';
  if (months.length) {
    var mx=1;
    months.forEach(function(m){ if(p.consumed_by_month[m]>mx) mx=p.consumed_by_month[m]; });
    chart += '<div class="chart-bars">';
    months.forEach(function(m){
      var v=p.consumed_by_month[m], h=Math.max(5,Math.round(v/mx*90));
      chart +=
        '<div class="bar-col">'+
          '<div class="bar-body" style="height:'+h+'px">'+
            '<div class="bar-tip">'+v+' aulas</div>'+
          '</div>'+
          '<div class="bar-lbl">'+m.replace(/-/g,"/")+'</div>'+
        '</div>';
    });
    chart += '</div>';
  } else {
    chart += '<div class="no-chart">Sem historico de consumo registrado ainda</div>';
  }
  chart += '</div>';

  // Lessons
  var lessons = '<div class="sec-title">Aulas do PDI</div><div class="lessons-grid">';
  p.pdi_lessons.forEach(function(l){
    var ok = l.consumed;
    var lnk = l.link ? '<a class="l-link" href="'+esc(l.link)+'" target="_blank">Acessar aula &#8594;</a>' : "";
    lessons +=
      '<div class="lesson '+(ok?"lesson-done":"lesson-pend")+'">'+
        '<div class="l-icon '+(ok?"l-icon-done":"l-icon-pend")+'">'+(ok?"&#10003;":"&#9679;")+'</div>'+
        '<div class="l-body">'+
          '<div class="l-title">'+esc(l.title)+'</div>'+
          '<div class="l-status '+(ok?"l-status-done":"l-status-pend")+'">'+(ok?"Concluida":"Pendente")+'</div>'+
          lnk+
        '</div>'+
      '</div>';
  });
  lessons += '</div>';

  // Badges
  var bgs = '<div class="det-badges">';
  if(p.company) bgs+='<span class="badge badge-co">&#127970; '+esc(p.company)+'</span>';
  if(p.cargo)   bgs+='<span class="badge badge-role">'+esc(p.cargo)+'</span>';
  if(p.email_cs) bgs+='<span class="badge badge-cs">CS: '+esc(p.email_cs)+'</span>';
  bgs += '</div>';

  panel.innerHTML =
    '<div class="det-name">'+esc(p.name)+'</div>'+
    bgs + kpi + prog + chart + lessons;
}

document.getElementById("s-name").addEventListener("input", filter);
document.getElementById("s-company").addEventListener("change", filter);
document.getElementById("s-progress").addEventListener("change", filter);
document.getElementById("reset-btn").addEventListener("click", reset);
document.getElementById("print-btn").addEventListener("click", function(){ window.print(); });

filter();
</script>
</body>
</html>
